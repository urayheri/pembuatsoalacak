<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Shuffler - Custom Layout (v4.3)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <header class="bg-indigo-600 text-white py-6 shadow-md">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold">🔀 Exam Shuffler v4.3 (Custom)</h1>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 flex-1 max-w-4xl space-y-6">
        <!-- Panel Pengaturan Hybrid -->
        <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Kop & Logo -->
            <div class="space-y-3">
                <h3 class="text-sm font-bold text-indigo-600">🖼️ Kop Surat & Logo</h3>
                <input type="file" id="kopGambarInput" accept="image/*" class="w-full border rounded p-1.5 text-xs">
                <input type="text" id="textLine1" value="PEMERINTAH PROVINSI KALIMANTAN BARAT" class="w-full border rounded p-2 text-[10px]">
                <input type="text" id="textLine2" value="SMK NEGERI 1 SEMPARUK" class="w-full border rounded p-2 text-sm font-bold">
                <input type="text" id="textLine3" value="Jalan Pendidikan Nomor 19, Kec. Semparuk, Sambas" class="w-full border rounded p-2 text-[10px]">
            </div>

            <!-- Pengaturan Kustom (Font & Margin) -->
            <div class="space-y-3">
                <h3 class="text-sm font-bold text-indigo-600">⚙️ Font, Margin & Kertas</h3>
                <div class="grid grid-cols-2 gap-2 text-xs">
                    <select id="fontFamily" class="border rounded p-1.5"><option value="Arial">Arial</option><option value="Times New Roman">Times New Roman</option><option value="Calibri">Calibri</option></select>
                    <input type="number" id="fontSize" value="11" placeholder="Size (pt)" class="border rounded p-1.5">
                    <input type="number" id="marginCm" value="1.27" step="0.1" placeholder="Margin (cm)" class="border rounded p-1.5">
                    <select id="pageSize" class="border rounded p-1.5"><option value="F4">F4 (Folio)</option><option value="A4">A4</option></select>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="attrMapel" placeholder="Mata Pelajaran" class="border rounded p-1.5">
                    <input type="text" id="attrKelas" placeholder="Kelas" class="border rounded p-1.5">
                </div>
            </div>
        </section>

        <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <input type="file" id="excelInput" accept=".xlsx, .xls" class="hidden">
                <label for="excelInput" class="block text-center border-2 border-dashed p-6 cursor-pointer">📊 Unggah Excel Bank Soal</label>
            </div>
            <button id="processBtn" class="bg-indigo-600 text-white font-bold rounded-2xl">📝 Ekspor Word</button>
        </section>
    </main>

    </script>
</body>
</html>
